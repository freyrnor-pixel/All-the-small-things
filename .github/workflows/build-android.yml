name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android preview APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app.json (runtimeVersion / slug guardrail)
        run: node .github/scripts/check-app-config.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Start APK build (don't block the runner)
        run: eas build --platform android --profile preview --non-interactive --no-wait

      - name: Build queued
        run: |
          echo "Build queued on EAS. Track progress and download the APK from https://expo.dev (project → Builds)."
          echo "The actual compile happens on Expo's cloud infrastructure, not this GitHub runner — this job is done once the build is queued."
