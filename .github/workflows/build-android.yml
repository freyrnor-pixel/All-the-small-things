name: Build Android APK

on:
  push:
    branches: [main, master, claude/adhd-task-life-app-TOdFj]
  workflow_dispatch:

jobs:
  build:
    name: Build Android preview APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Get build URL
        run: |
          echo "Build complete! Download your APK from https://expo.dev"
          echo "Or run: eas build:list to see the latest build URL"
