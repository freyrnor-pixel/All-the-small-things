name: Build Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK (arm64-v8a)
    runs-on: ubuntu-latest
    env:
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app.json (runtimeVersion / slug guardrail)
        run: node .github/scripts/check-app-config.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK (arm64-v8a only)
        working-directory: android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unfocus-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
