name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android preview APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app.json (runtimeVersion / slug guardrail)
        run: node .github/scripts/check-app-config.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (local)
        run: npx eas-cli build --platform android --profile preview --local --non-interactive

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Build complete
        run: |
          echo "APK built locally and uploaded as artifact 'android-apk'"
