name: OTA Update

on:
  push:
    branches:
      - claude/adhd-task-life-app-TOdFj
  workflow_dispatch:

jobs:
  update:
    name: Push OTA update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push update
        run: eas update --auto --channel preview --non-interactive
