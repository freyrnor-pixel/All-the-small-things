name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    env:
      CI: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate app.json (runtimeVersion / slug guardrail)
        run: node .github/scripts/check-app-config.js

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck
